<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>German Address Elevation</title>
<style>
  :root {
    --accent: #2563eb;
    --text: #1f2937;
    --muted: #6b7280;
    --border: #e5e7eb;
    --bg: #f9fafb;
    --error: #b91c1c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    color: var(--text);
    background: var(--bg);
    display: flex;
    justify-content: center;
    padding: 48px 16px;
  }
  main { width: 100%; max-width: 560px; }
  h1 { font-size: 1.4rem; margin: 0 0 4px; }
  .sub { color: var(--muted); margin: 0 0 24px; font-size: 0.95rem; }
  form { display: flex; gap: 8px; }
  input {
    flex: 1;
    padding: 10px 12px;
    font-size: 1rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: #fff;
  }
  input:focus { outline: 2px solid var(--accent); border-color: transparent; }
  button {
    padding: 10px 18px;
    font-size: 1rem;
    border: none;
    border-radius: 8px;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
  }
  button:disabled { opacity: 0.6; cursor: wait; }
  .examples { margin: 12px 0 0; display: flex; flex-wrap: wrap; gap: 8px; }
  .examples a {
    font-size: 0.85rem;
    color: var(--accent);
    text-decoration: none;
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 4px 10px;
    background: #fff;
  }
  .examples a:hover { border-color: var(--accent); }
  #result, #error {
    margin-top: 24px;
    padding: 20px;
    border-radius: 10px;
    background: #fff;
    border: 1px solid var(--border);
    display: none;
  }
  #error { color: var(--error); border-color: #fecaca; background: #fef2f2; }
  .elevation { font-size: 2.2rem; font-weight: 600; }
  .elevation small { font-size: 1.1rem; color: var(--muted); font-weight: 400; }
  dl { display: grid; grid-template-columns: auto 1fr; gap: 4px 16px; margin: 16px 0 0; font-size: 0.92rem; }
  dt { color: var(--muted); }
  dd { margin: 0; overflow-wrap: anywhere; }
  .attribution { margin-top: 16px; font-size: 0.78rem; color: var(--muted); }
  footer { margin-top: 32px; font-size: 0.85rem; color: var(--muted); }
  footer a { color: var(--accent); }
</style>
</head>
<body>
<main>
  <h1>German Address Elevation</h1>
  <p class="sub">Postal address &rarr; coordinates and terrain elevation (official DGM1 data).</p>

  <form id="form">
    <input id="address" name="address" placeholder="e.g. Pariser Platz 1, 10117 Berlin"
           autocomplete="street-address" autofocus required>
    <button id="submit" type="submit">Look up</button>
  </form>

  <div class="examples">
    <a href="#" data-address="Pariser Platz 1, 10117 Berlin">Brandenburg Gate</a>
    <a href="#" data-address="Marienplatz 1, 80331 München">Marienplatz, Munich</a>
    <a href="#" data-address="Zugspitzstraße 14, 82491 Grainau">Grainau (Alps)</a>
  </div>

  <div id="result">
    <div class="elevation"><span id="elevation"></span> <small>m above sea level</small></div>
    <dl>
      <dt>Resolved to</dt><dd id="resolved"></dd>
      <dt>Latitude</dt><dd id="lat"></dd>
      <dt>Longitude</dt><dd id="lon"></dd>
      <dt>Dataset</dt><dd id="origin"></dd>
    </dl>
    <div class="attribution" id="attribution"></div>
  </div>

  <div id="error"></div>

  <footer>Same data as <code>GET /elevation?address=&hellip;</code> &mdash; see the <a href="/docs">API docs</a>.</footer>
</main>

<script>
  const form = document.getElementById("form");
  const input = document.getElementById("address");
  const button = document.getElementById("submit");
  const resultBox = document.getElementById("result");
  const errorBox = document.getElementById("error");

  async function lookup(address) {
    button.disabled = true;
    button.textContent = "Looking up…";
    resultBox.style.display = "none";
    errorBox.style.display = "none";
    try {
      const response = await fetch("/elevation?" + new URLSearchParams({ address }));
      const body = await response.json();
      if (!response.ok) {
        throw new Error(body.error ? body.error.message : "Request failed (HTTP " + response.status + ")");
      }
      document.getElementById("elevation").textContent = body.elevation_m;
      document.getElementById("resolved").textContent = body.resolved_address || "—";
      document.getElementById("lat").textContent = body.latitude;
      document.getElementById("lon").textContent = body.longitude;
      document.getElementById("origin").textContent = body.data_origin || "—";
      document.getElementById("attribution").textContent = body.attribution || "";
      resultBox.style.display = "block";
    } catch (err) {
      errorBox.textContent = err.message;
      errorBox.style.display = "block";
    } finally {
      button.disabled = false;
      button.textContent = "Look up";
    }
  }

  form.addEventListener("submit", (event) => {
    event.preventDefault();
    const address = input.value.trim();
    if (address) lookup(address);
  });

  document.querySelectorAll(".examples a").forEach((link) => {
    link.addEventListener("click", (event) => {
      event.preventDefault();
      input.value = link.dataset.address;
      lookup(link.dataset.address);
    });
  });
</script>
</body>
</html>
